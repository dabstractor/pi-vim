name: checks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: sudo apt-get update && sudo apt-get install -y neovim
      - run: npm ci
      - run: npm run check
      - run: npm run test:nvim
      - run: npm run pack:check
  # Installs the packed tarball into a throwaway consumer project with the
  # real @earendil-works/pi-* peers and asserts it loads/activates (#33).
  consumer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:smoke
